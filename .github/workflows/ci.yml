name: DevSecOps CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run automated tests
        run: mvn --batch-mode clean test

      - name: Package application
        run: mvn --batch-mode package -DskipTests

      - name: Upload JAR and test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-and-test-results
          path: |
            target/*.jar
            target/surefire-reports/**
          if-no-files-found: warn
          retention-days: 14

  dependency-vulnerability-scan:
    name: Trivy Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Scan Maven dependencies
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          vuln-type: library
          severity: HIGH,CRITICAL
          format: table
          output: trivy-vulnerability-report.txt
          exit-code: "1"

      - name: Display vulnerability report
        if: always()
        run: |
          if [ -s trivy-vulnerability-report.txt ]; then
            cat trivy-vulnerability-report.txt
          else
            echo "No HIGH or CRITICAL dependency vulnerabilities found."
          fi

      - name: Upload vulnerability report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-vulnerability-report
          path: trivy-vulnerability-report.txt
          if-no-files-found: warn
          retention-days: 14

  secret-scan:
    name: Trivy Secret Scan
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Scan repository for secrets
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret
          format: table
          output: trivy-secret-report.txt
          exit-code: "1"

      - name: Display secret scan report
        if: always()
        run: |
          if [ -s trivy-secret-report.txt ]; then
            cat trivy-secret-report.txt
          else
            echo "No hardcoded secrets found."
          fi

      - name: Upload secret scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-secret-report
          path: trivy-secret-report.txt
          if-no-files-found: warn
          retention-days: 14
